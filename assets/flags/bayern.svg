<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="fcb-inner">
      <circle cx="32" cy="32" r="18"/>
    </clipPath>
  </defs>
  <!-- Red outer circle -->
  <circle cx="32" cy="32" r="30" fill="#DC052D"/>
  <!-- White ring -->
  <circle cx="32" cy="32" r="25" fill="white"/>
  <!-- Bavarian diamonds (2x2 grid, blue-white-white-blue) -->
  <g clip-path="url(#fcb-inner)">
    <rect x="14" y="14" width="18" height="18" fill="#003D82"/>
    <rect x="32" y="14" width="18" height="18" fill="white"/>
    <rect x="14" y="32" width="18" height="18" fill="white"/>
    <rect x="32" y="32" width="18" height="18" fill="#003D82"/>
  </g>
  <!-- Outer border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#8B0000" stroke-width="1.5"/>
  <!-- FCB text -->
  <text x="32" y="58" font-size="7" text-anchor="middle" fill="white" font-family="Arial" font-weight="bold">FCB</text>
</svg>
