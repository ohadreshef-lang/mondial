name: Update match results

on:
  schedule:
    # GitHub throttles high-frequency schedules (observed: every ~2h, not */5). So a
    # single run polls internally every 5 min for up to ~5.5h (see the loop) — one
    # trigger blankets a whole evening of matches with 5-min-fresh live scores, no
    # matter how sparsely GitHub actually fires.
    - cron: '*/5 * * * *'
  workflow_dispatch:

# cancel-in-progress so a new trigger RESTARTS the long poll instead of queueing
# behind it (the loop is idempotent — each iteration reads fresh state). This keeps
# coverage continuous during matches with zero backlog of stale long-running jobs.
concurrency:
  group: update-results
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Poll finished + live matches (~10-min cadence, up to ~5.5h)
        run: |
          # TEMPORARY: 10-min cadence to conserve API-Football quota (revert to 5 min /
          # sleep 300 / seq 66 after the daily quota renewal at 00:00 UTC).
          # Poll every 10 min for up to ~5.5h. set +e so a single failing iteration
          # (transient blip / stale-red) never aborts the loop; we exit with the LAST
          # iteration's status (persistent issue -> red, recovered transient -> green).
          # The script prints LOOP_IDLE when no match is live and none starts within
          # ~2h — we end the run early then so the runner isn't held open all night
          # (the cron re-triggers before the next match).
          set +e
          last=0
          for i in $(seq 1 33); do
            echo "::group::poll $i/33 ($(date -u +%H:%M:%S)Z)"
            out=$(node scripts/update-results.mjs 2>&1); last=$?
            printf '%s\n' "$out"
            echo "::endgroup::"
            if printf '%s' "$out" | grep -q 'LOOP_IDLE'; then
              echo "No live game and none within ~2h — ending run early; cron will re-trigger."
              break
            fi
            [ "$i" -lt 33 ] && sleep 600
          done
          exit $last
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
