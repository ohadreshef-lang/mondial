name: Update match results

on:
  schedule:
    # Every 5 min for fresher live scores. API-Football free is 100 req/day; the live
    # call only fires during live windows. On a heavy matchday this can reach the cap —
    # that's fine: fetchApiFootballLive() returns [] on HTTP 429 / quota error, so
    # finals + points (football-data.org) keep working and live scores resume when the
    # quota resets at 00:00 UTC.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch finished + live matches and write results
        run: node scripts/update-results.mjs
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
