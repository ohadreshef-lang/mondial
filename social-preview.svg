<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Animated-style decorative elements -->
  <circle cx="150" cy="500" r="200" fill="white" opacity="0.03"/>
  <circle cx="1050" cy="130" r="180" fill="white" opacity="0.04"/>
  <circle cx="600" cy="650" r="250" fill="white" opacity="0.02"/>

  <!-- Pie chart decoration -->
  <g transform="translate(180, 200)">
    <circle cx="80" cy="80" r="70" fill="none" stroke="white" stroke-width="20" opacity="0.2"/>
    <circle cx="80" cy="80" r="70" fill="none" stroke="white" stroke-width="20"
            stroke-dasharray="110 330" stroke-dashoffset="0" opacity="0.5"/>
    <circle cx="80" cy="80" r="70" fill="none" stroke="#fbbf24" stroke-width="20"
            stroke-dasharray="88 352" stroke-dashoffset="-110" opacity="0.7"/>
    <circle cx="80" cy="80" r="70" fill="none" stroke="#34d399" stroke-width="20"
            stroke-dasharray="66 374" stroke-dashoffset="-198" opacity="0.7"/>
  </g>

  <!-- Bar chart decoration -->
  <g transform="translate(920, 180)">
    <rect x="0" y="60" width="30" height="100" rx="4" fill="white" opacity="0.3"/>
    <rect x="40" y="30" width="30" height="130" rx="4" fill="white" opacity="0.4"/>
    <rect x="80" y="80" width="30" height="80" rx="4" fill="white" opacity="0.25"/>
    <rect x="120" y="50" width="30" height="110" rx="4" fill="white" opacity="0.35"/>
  </g>

  <!-- Main content area -->
  <rect x="200" y="180" width="800" height="300" rx="20" fill="white" opacity="0.95"/>

  <!-- Question mark icon -->
  <g transform="translate(555, 210)">
    <circle cx="45" cy="45" r="40" fill="#7c3aed" opacity="0.1"/>
    <text x="45" y="65" text-anchor="middle" font-family="Arial" font-size="50" font-weight="bold" fill="#7c3aed">?</text>
  </g>

  <!-- Hebrew text - Main title -->
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1f2937" direction="rtl">
    סקר הקצאת אחוזים
  </text>

  <!-- Hebrew text - Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#6b7280" direction="rtl">
    חלקו 100% בין האפשרויות השונות
  </text>

  <!-- Call to action button -->
  <rect x="420" y="410" width="360" height="55" rx="27" fill="#7c3aed"/>
  <text x="600" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">
    הצביעו עכשיו
  </text>

  <!-- Percentage decorations -->
  <text x="100" y="120" font-family="Arial" font-size="48" font-weight="bold" fill="white" opacity="0.15">47%</text>
  <text x="950" y="550" font-family="Arial" font-size="48" font-weight="bold" fill="white" opacity="0.15">28%</text>
  <text x="80" y="450" font-family="Arial" font-size="36" font-weight="bold" fill="white" opacity="0.1">15%</text>
  <text x="1020" y="100" font-family="Arial" font-size="36" font-weight="bold" fill="white" opacity="0.1">10%</text>

  <!-- Bottom tagline -->
  <text x="600" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.9" filter="url(#glow)">
    הביעו את דעתכם - שתפו עם חברים
  </text>
</svg>
